name: ci

on:
  push:
    branches: ["**"]
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Ensure PostgreSQL server binaries are available
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          echo "$(ls -d /usr/lib/postgresql/*/bin | head -1)" >> "$GITHUB_PATH"

      - name: Sync deps (frozen, with dev)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
