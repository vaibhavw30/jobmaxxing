name: ci

on:
  push:
    branches: [main]      # post-merge validation; PRs are covered by pull_request below
  pull_request: {}        # no secrets needed, so safe on fork PRs

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Ensure PostgreSQL server binaries are available
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql
          echo "$(ls -d /usr/lib/postgresql/*/bin | sort -V | tail -1)" >> "$GITHUB_PATH"

      - name: Sync deps (frozen, with dev)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
